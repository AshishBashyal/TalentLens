services:
  postgres:
    image: postgres:16-alpine
    container_name: talentlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentlens
      POSTGRES_USER: talentlens
      POSTGRES_PASSWORD: talentlens
    ports:
      - "5432:5432"
    volumes:
      - talentlens_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentlens -d talentlens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  talentlens_postgres_data:

